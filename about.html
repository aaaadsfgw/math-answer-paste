      <h1>About</h1>
      <section class="article-block">
        <h2>システム概要</h2>
        <p>Math Answer Paste は、数学・情報系の問題文をローカルの Ollama に送り、答えだけを1行で表示・コピーしやすくする Chrome 拡張です。</p>
      </section>
      <section class="article-block">
        <h2>ローカルAIを使う理由</h2>
        <p>問題文を外部サーバーへ送らず、ユーザーのPC上で動くLLMにだけ渡す方針です。APIキーや秘密情報は使いません。</p>
      </section>
      <section class="article-block">
        <h2>注意事項</h2>
        <p>回答はAIによる推定です。提出前には問題文と計算過程を確認してください。ヒントモードでは答えを直接出さない設計です。</p>
      </section>
    </main>

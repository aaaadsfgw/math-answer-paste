<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Math Answer Paste</title>
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/pages/popup.css">
  </head>
  <body class="app-body popup-body">
    <header class="topbar">
      <a class="brand" href="popup.html">Math Answer Paste</a>
      <nav class="nav-links" aria-label="画面">
        <a href="popup.html" aria-current="page">解く</a>
        <a href="history.html">履歴</a>
        <a href="settings.html">設定</a>
        <a href="examples.html">例題</a>
        <a href="help.html">ヘルプ</a>
        <a href="about.html">About</a>
      </nav>
    </header>

    <main class="page-shell compact-shell">
      <section class="panel input-panel">
        <div class="section-heading">
          <h1>問題を入力</h1>
          <span id="runtimeBadge" class="badge">読み込み中</span>
        </div>
        <textarea id="questionInput" class="textarea" rows="8" placeholder="例: 2x + 3 = 11"></textarea>
        <div class="toolbar">
          <button id="loadSelectionButton" class="button secondary" type="button">選択テキスト読込</button>
          <select id="modeSelect" class="select" aria-label="出力モード">
            <option value="answer">答えだけ</option>
            <option value="steps">途中式つき</option>
            <option value="explain">簡単な解説つき</option>
            <option value="hint">ヒントだけ</option>
          </select>
          <button id="solveButton" class="button primary" type="button">解く</button>
        </div>
      </section>

      <section class="panel result-panel" aria-live="polite">
        <div class="section-heading">
          <h2>結果</h2>
          <button id="copyButton" class="button icon-button" type="button" disabled>コピー</button>
        </div>
        <output id="answerOutput" class="answer-output">[ ]</output>
        <pre id="detailOutput" class="detail-output"></pre>
        <p id="statusMessage" class="status-message">問題文を入力して「解く」を押してください。</p>
      </section>
    </main>

    <script type="module" src="js/popup.js"></script>
  </body>
</html>
